{% extends "home.html" %}

{% block body %}
<table>
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Age</th>
    <th>Role</th>
</tr>
{% if users %}
    {% for user in users %}
    <tr>
    <td>{{ user.id }}</td>
    <td>{{ user.name }}</td>
    <td>{{ user.age }}</td>
    <td>{{ user.role }}</td>
</tr>
    {% endfor %}
</table>
{% endif %}    

{% endblock %}
